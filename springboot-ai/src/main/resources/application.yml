spring:
  application:
    name: spring-ai-poc
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.example.springai: DEBUG
    org.springframework.ai: DEBUG
